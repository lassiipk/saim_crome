<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Startpage</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,400;0,500;0,700;0,900;1,400;1,500;1,700;1,900&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css?family=Pacifico" rel="stylesheet" />

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

  <!-- Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="main-wrapper" class="fancy-scrollbar">
    <div id="main">
      <div id="content">

        <div id="links-container" style="padding-left: 30%; padding-right: 30%;">
          <a href="https://gmail.com" style="color: yellow; text-decoration: none; display: flex; flex-direction: column; align-items: center;">
            <i class="fas fa-envelope" style="font-size: 24px; color: yellow;"></i>
            <span style="font-weight: bold;">Gmail</span>
          </a>
          <a href="https://youtube.com" style="color: red; text-decoration: none; display: flex; flex-direction: column; align-items: center;">
            <i class="fab fa-youtube" style="font-size: 24px; color: red;"></i>
            <span style="font-weight: bold;">YouTube</span>
          </a>
          <a href="https://gemini.google.com/app" style="text-decoration: none; display: flex; flex-direction: column; align-items: center; color: lightgreen;">
            <i class="fa-sharp fa-light fa-microchip-ai" style="font-size: 24px; color: lightgreen;"></i>
            <span style="font-weight: bold;">Gemini</span>
          </a>
          <a href="https://photos.google.com/" style="color: orange; text-decoration: none; display: flex; flex-direction: column; align-items: center;">
            <i class="fa-sharp fa-light fa-aperture" style="font-size: 24px; color: orange;"></i>
            <span style="font-weight: bold;">Google Photos</span>
          </a>
        </div>

        <div class="mycontainer" style="padding-left: 30%; padding-right: 30%; padding-top: 1%;">
          <div id="header-container">
            <div class="parent">
              <div class="child">
                <main>
                  <div class="atom">
                    <div class="electron"></div>
                    <div class="electron-alpha"></div>
                    <div class="electron-omega"></div>
                  </div>
                </main>
              </div>
              <div class="child">
                <button type="button" id="user-menu-button" style="margin-right: 4%; margin-top: 1%; margin-bottom: 25%">
                  <img src="DP.jpg" style="height: 100px; width: 100px;" alt="Profile" />
                </button>

                <div class="social-buttons">
                  <a href="https://www.instagram.com" class="social-button social-button--instagram" aria-label="Instagram">
                    <i class="fab fa-instagram"></i>
                  </a>
                  <a href="https://www.youtube.com" class="social-button social-button--youtube" aria-label="YouTube">
                    <i class="fab fa-youtube"></i>
                  </a>
                  <a href="https://www.facebook.com" class="social-button social-button--facebook" aria-label="Facebook">
                    <i class="fab fa-facebook-f"></i>
                  </a>
                  <a href="https://snapchat.com/add/msaimghazanfar" class="social-button social-button--snapchat" aria-label="Snapchat">
                    <i class="fab fa-snapchat-ghost"></i>
                  </a>
                  <a href="https://github.com/lassiipk" class="social-button social-button--github" aria-label="GitHub">
                    <i class="fab fa-github"></i>
                  </a>
                </div>
              </div>
            </div>
          </div>

          <a style="display: inline-block;">
            <h3 class="txt-ne" style="margin-left: 9%; margin-top: -2%;" data-text="Developer Rahul">
              <div id="editable-text" contenteditable="true">Saim my love ❤️</div>
            </h3>
          </a>

          <div id="search-container" style="margin-top: 5%;">
            <div id="search-input-container">
              <img src="https://assets.codepen.io/1468070/Google+G+Icon.png" alt="" />
              <input type="text" placeholder="Search anything" id="search" />
            </div>
            <button id="image-button" onclick="googleSearch();" type="button">
              <i class="fa-regular fa-search"></i>
            </button>
            <button id="mic-button" type="button">
              <i class="fa-regular fa-microphone"></i>
            </button>
          </div>

          <div id="apps-container">
            <a href="https://chat.openai.com">
              <svg width="26" height="26" viewBox="0 0 41 41" fill="#10A37F" xmlns="http://www.w3.org/2000/svg" stroke-width="1.5" class="h-6 w-6"><path d="M37.5324 16.8707C37.9808 15.5241 38.1363 14.0974 37.9886 12.6859C37.8409 11.2744 37.3934 9.91076 36.676 8.68622C35.6126 6.83404 33.9882 5.3676 32.0373 4.4985C30.0864 3.62941 27.9098 3.40259 25.8215 3.85078C24.8796 2.7893 23.7219 1.94125 22.4257 1.36341C21.1295 0.785575 19.7249 0.491269 18.3058 0.500197C16.1708 0.495044 14.0893 1.16803 12.3614 2.42214C10.6335 3.67624 9.34853 5.44666 8.6917 7.47815C7.30085 7.76286 5.98686 8.3414 4.8377 9.17505C3.68854 10.0087 2.73073 11.0782 2.02839 12.312C0.956464 14.1591 0.498905 16.2988 0.721698 18.4228C0.944492 20.5467 1.83612 22.5449 3.268 24.1293C2.81966 25.4759 2.66413 26.9026 2.81182 28.3141C2.95951 29.7256 3.40701 31.0892 4.12437 32.3138C5.18791 34.1659 6.8123 35.6322 8.76321 36.5013C10.7141 37.3704 12.8907 37.5973 14.9789 37.1492C15.9208 38.2107 17.0786 39.0587 18.3747 39.6366C19.6709 40.2144 21.0755 40.5087 22.4946 40.4998C24.6307 40.5054 26.7133 39.8321 28.4418 38.5772C30.1704 37.3223 31.4556 35.5506 32.1119 33.5179C33.5027 33.2332 34.8167 32.6547 35.9659 31.821C37.115 30.9874 38.0728 29.9178 38.7752 28.684C39.8458 26.8371 40.3023 24.6979 40.0789 22.5748C39.8556 20.4517 38.9639 18.4544 37.5324 16.8707Z" fill="currentColor"></path></svg>
              <div class="label">
                <span class="name">Chat GPT</span>
                <span class="url" contenteditable="true">chat.openai.com</span>
              </div>
            </a>

            <a href="https://youtube.com">
              <i class="fa-brands fa-youtube"></i>
              <div class="label">
                <span class="name">YouTube</span>
                <span class="url">youtube.com</span>
              </div>
            </a>
          </div>

        </div>
      </div>
    </div>
  </div>

  <!-- External: Hyperplexed dropdown pen -->
  <script src='https://codepen.io/Hyperplexed/pen/xxYJYjM/54407644e24173ad6019b766443bf2a6.js'></script>

  <!-- Main script -->
  <script src="script.js"></script>

</body>
</html>
